<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battleship</title>
    <link rel="icon" type="image" href="./img/cruise-ship.png" />
  </head>
  <body>
    <header>BATTLESHIP</header>
    <div class="main">
      <div class="left">
        <div class="board" id="grid-one"></div>
        <div class="controls">
          <div class="set">
            <button id="random">Random</button>
            <button id="place">Place ships</button>
          </div>
          <div class="start">
            <button disabled>Start</button>
          </div>
        </div>
        <div class="ship-container"></div>
      </div>
      <div class="right">
        <div class="board" id="grid-two"></div>
        <div class="controls">
          <button id="restart">Restart</button>
        </div>
      </div>
    </div>
    <dialog>
      <p></p>
      <button class="close" autofocus>Close</button>
    </dialog>
  </body>
</html>
